name: NISHLAB Job Alerts

on:
  schedule:
    # Runs every day at 10:00 AM IST (04:30 UTC)
    - cron: "30 4 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write   # needed so the workflow can commit the updated seen_jobs.json back

jobs:
  send-job-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job alert script
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_alert.py

      - name: Save updated seen-jobs list
        run: |
          git config user.name "nishlab-job-bot"
          git config user.email "bot@nishlabcreations.online"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "Update seen jobs list"
          git push
